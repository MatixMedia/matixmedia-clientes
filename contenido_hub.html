  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',system-ui,sans-serif;background:#04050A;color:#FDFCF7;}
    input[type=date]{color-scheme:dark;background:#1A1B24;color:#FDFCF7;border:1px solid #1E1F28;padding:3px 8px;border-radius:6px;font-size:10px;font-family:monospace;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:#0C0D13;}
    ::-webkit-scrollbar-thumb{background:#1E1F28;border-radius:2px;}
    select option{background:#1A1B24;color:#FDFCF7;}
    button,select,a{cursor:pointer;}
    
  .report-footer{background:#0C0D13;border-top:1px solid #1E1F28;padding:24px 20px;margin-top:32px}
  .footer-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
  .footer-brand{display:flex;align-items:center;gap:10px}
  .footer-logo{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid #E8C046;background:#fff;flex-shrink:0}
  .footer-logo img{width:100%;height:100%;object-fit:contain;padding:2px}
  .footer-name{font-family:monospace;font-size:11px;color:#E8C046;font-weight:600}
  .footer-sub{font-size:9px;color:#A8A598}
  .footer-date{font-family:monospace;font-size:9px;color:#A8A598;margin-top:2px}
  .footer-links{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .footer-social{width:30px;height:30px;border-radius:50%;background:#14151C;border:1px solid #1E1F28;display:flex;align-items:center;justify-content:center;transition:.2s;cursor:pointer;text-decoration:none}
  .footer-social:hover{background:#E8C046;border-color:#E8C046}
  .footer-social:hover svg{fill:#04050A}
  .footer-social svg{width:14px;height:14px;fill:#A8A598;transition:.2s}
  .footer-wa{display:flex;align-items:center;gap:7px;background:#25D366;color:#fff;font-family:monospace;font-size:10px;font-weight:600;padding:7px 12px;border-radius:18px;cursor:pointer;border:none;animation:wa-shake 10s infinite}
  .footer-wa svg{width:14px;height:14px;fill:#fff;flex-shrink:0}
  @keyframes wa-shake{0%,85%,100%{transform:none}87%{transform:rotate(-12deg)}89%{transform:rotate(12deg)}91%{transform:rotate(-8deg)}93%{transform:rotate(8deg)}95%{transform:rotate(-4deg)}97%{transform:rotate(0)}}

  </style>

lando la pantalla",pantalla:"Les deb\xEDa este video \u{1F4CC}",tip:"Deuda social \u2014 implica que hay gente esperando. Da FOMO a quien no vio la historia. El seguidor fiel lo reconoce, el nuevo siente curiosidad."},{label:"TRANSICI\xD3N",tiempo:"0:04-0:08",color:"#5A5A52",icon:"\u2702\uFE0F",audio:'"...y me di cuenta de que el problema era m\xE1s profundo de lo que pensaba."',visual:"Corte seco \xB7 t\xFA a c\xE1mara directo \xB7 energ\xEDa alta",pantalla:"\u2014",tip:"Abre un loop de expectativa antes del hook principal. El cambio brusco de ritmo mantiene la atenci\xF3n en el momento cr\xEDtico."},{label:"HOOK",tiempo:"0:08-0:12",color:"#CF343A",icon:"\u{1F3AF}",audio:'"Los partidos pol\xEDticos saben exactamente que sus volantes van a la basura."',visual:"Primer plano \xB7 sin distracciones \xB7 corte limpio",pantalla:"\u2014",tip:"Declaraci\xF3n que nombra un culpable \u2014 dispara comentarios de quienes est\xE1n de acuerdo y de quienes defienden el sistema."},{label:"OPEN LOOP",tiempo:"0:12-0:16",color:"#E8C046",icon:"\u{1F440}",audio:'"Y los mandan igual. \xBFPor qu\xE9?"',visual:"Zoom out sutil \xB7 Green Screen con imagen de volantes en el suelo",pantalla:"\xBFPor qu\xE9? \u{1F440}",tip:"Pregunta sin responder = el espectador no puede irse hasta saber. Es el mecanismo m\xE1s poderoso de retenci\xF3n en video corto."},{label:"VILLAIN",tiempo:"0:16-0:22",color:"#CF343A",icon:"\u{1F3ED}",audio:'"Porque hay un modelo de negocio montado alrededor del papel. Imprentas, distribuci\xF3n, contratos. Moverlo a digital destruye ese negocio. No es ignorancia, es inter\xE9s."',visual:"Quitas GS \xB7 primer plano directo",pantalla:"El negocio del papel",tip:"Nombrar al villano espec\xEDfico (imprentas/contratos) genera m\xE1s comentarios que una cr\xEDtica gen\xE9rica. La audiencia lo va a compartir para validar lo que ya sospechaba."},{label:"REGLA DE ORO",tiempo:"0:22-0:28",color:"#E8C046",icon:"\u{1F947}",audio:'"Los que s\xED ganan elecciones lo entendieron hace tiempo: la exposici\xF3n se gana en digital y se afianza en f\xEDsico. No al rev\xE9s."',visual:"Cambio de \xE1ngulo ligero",pantalla:"Regla de oro \u{1F947}",tip:"Contraste claro entre los que ganan y los que pierden. Posiciona a Jairo como quien sabe cu\xE1l es el lado correcto."},{label:"PRUEBA EXTERNA",tiempo:"0:28-0:33",color:"#4A9EE0",icon:"\u{1F1FA}\u{1F1F8}",audio:'"Obama lo demostr\xF3 en 2008: construy\xF3 una base de 13 millones de contactos digitales antes de mandar a la gente a tocar puertas."',visual:"Foto de Obama en campa\xF1a 2008 o gr\xE1fico de anal\xEDtica digital",pantalla:"Obama 2008 \xB7 13M contactos",tip:"Autoridad externa + n\xFAmero concreto = credibilidad prestada. El caso Obama es universalmente conocido y no genera debate pol\xEDtico propio."},{label:"PRUEBA PROPIA",tiempo:"0:33-0:41",color:"#199477",icon:"\u{1F4CA}",audio:'"Nosotros lo replicamos en Colombia: elecciones al Congreso, estrategia 100% digital, m\xE1s de 130.000 contactos reales. Cero papel tirado a la calle."',visual:"N\xFAmero +130.000 en pantalla grande \xB7 rostro seguro",pantalla:"+130.000 contactos reales \u2705",tip:"El proof point m\xE1s poderoso del video \u2014 n\xFAmero espec\xEDfico, caso real, resultado concreto. Diferencia a Jairo de cualquiera que solo teoriza."},{label:"CTA POLARIZANTE",tiempo:"0:41-0:47",color:"#7C3AED",icon:"\u{1F4AC}",audio:'"\xBFMiedo a innovar o negocio que no quieren soltar? Dime en los comentarios \u2014 y si conoces a alguien en pol\xEDtica, m\xE1ndale esto."',visual:"Primer plano \xB7 se\xF1alas c\xE1mara",pantalla:"\xBFMiedo o negocio? \u{1F4AC}\u{1F447}",tip:"Pregunta polarizante que obliga a elegir un lado + pedido expl\xEDcito de share. Cada comentario alimenta el algoritmo, cada share ampl\xEDa el alcance."}],copy:`El mayor fraude del marketing pol\xEDtico no es la corrupci\xF3n.
Es el volante que todos saben que va a la basura y mandan igual. \u{1F4B8}

No es ignorancia. Es un modelo de negocio:
imprentas, distribuci\xF3n, contratos.
Moverlo a digital destruye ese ecosistema.
Y eso nadie lo quiere admitir.

Los que s\xED ganan elecciones lo entendieron hace rato:
\u{1F4F1} La exposici\xF3n se construye en digital.
\u{1F3D8}\uFE0F Se convierte en f\xEDsico.

Obama lo demostr\xF3 en 2008 con 13 millones de contactos
antes de movilizar gente puerta a puerta.

Nosotros lo replicamos en Colombia:
elecciones al Congreso \xB7 estrategia 100% digital
\u2192 +130.000 contactos reales, sin botar papel a las calles.

\xBFMiedo a innovar o un modelo que no quieren soltar?
Te leo \u{1F447}

\u{1F4CC} Guarda esto si analizas marketing o pol\xEDtica.

onde ya dijo si su P-Max tiene las se\xF1ales necesarias o no."}],copy:`El error m\xE1s caro en Google Ads no es el presupuesto.
