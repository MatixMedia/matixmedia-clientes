(n,l){if(l)return{color:"#7C3AED",bg:"rgba(124,58,237,.15)",icon:"\u2705",label:"Publicado",nivel:0};const o=diasRestantes(n);return o===null?null:o<0?{color:"#CF343A",bg:"rgba(207,52,58,.2)",icon:"\u{1F534}",label:"Vencido",nivel:3}:o===0?{color:"#CF343A",bg:"rgba(207,52,58,.15)",icon:"\u{1F534}",label:"Hoy",nivel:3}:o<=2?{color:"#E8C046",bg:"rgba(232,192,70,.15)",icon:"\u{1F7E1}",label:o===1?"Ma\xF1ana":"En "+o+" d\xEDas",nivel:2}:o<=5?{color:"#E8C046",bg:"rgba(232,192,70,.1)",icon:"\u{1F7E1}",label:"En "+o+" d\xEDas",nivel:1}:{color:"#199477",bg:"rgba(25,148,119,.1)",icon:"\u{1F7E2}",label:"En "+o+" d\xEDas",nivel:0}}const HUB={clientes:[{id:"jairo",prioridad:99,nombre:"Jairo Google Ads"},{id:"biorsan",prioridad:99,nombre:"BIORSAN SAS"},{id:"dentiplan",prioridad:99,nombre:"Dentiplan Plus"}],contenido:{"jairo_2026-06":[{id:"mkt-politico",prioridad:1,titulo:"El Mito del Marketing Pol\xEDtico",formato:"Reel",plataformas:["Instagram","TikTok"],estado:"Publicado",duracion:"47s",fecha_grabacion:"2026-06-10",fecha_publicacion:"2026-06-15",objetivo:"Engagement \xB7 comentarios \xB7 shares",blocks:[{label:"PRE-HOOK",tiempo:"0:00-0:04",color:"#7C3AED",icon:"\u{1F4F1}",audio:'"Les deb\xEDa este video. Hace unas semanas sub\xED esta historia..."',visual:"Screen de la historia de Instagram con volantes tirados \xB7 t\xFA en c\xE1mara se\xF1alando la pantalla",pantalla:"Les deb\xEDa este video \u{1F4CC}",tip:"Deuda social \u2014 implica que hay gente esperando. Da FOMO a quien no vio la historia. El seguidor fiel lo reconoce, el nuevo siente curiosidad."},{label:"TRANSICI\xD3N",tiempo:"0:04-0:08",color:"#5A5A52",icon:"\u2702\uFE0F",audio:'"...y me di cuenta de que el problema era m\xE1s profundo de lo que pensaba."',visual:"Corte seco \xB7 t\xFA a c\xE1mara directo \xB7 energ\xEDa alta",pantalla:"\u2014",tip:"Abre un loop de expectativa antes del hook principal. El cambio brusco de ritmo mantiene la atenci\xF3n en el momento cr\xEDtico."},{label:"HOOK",tiempo:"0:08-0:12",color:"#CF343A",icon:"\u{1F3AF}",audio:'"Los partidos pol\xEDticos saben exactamente que sus volantes van a la basura."',visual:"Primer plano \xB7 sin distracciones \xB7 corte limpio",pantalla:"\u2014",tip:"Declaraci\xF3n que nombra un culpable \u2014 dispara comentarios de quienes est\xE1n de acuerdo y de quienes defienden el sistema."},{label:"OPEN LOOP",tiempo:"0:12-0:16",color:"#E8C046",icon:"\u{1F440}",audio:'"Y los mandan igual. \xBFPor qu\xE9?"',visual:"Zoom out sutil \xB7 Green Screen con imagen de volantes en el suelo",pantalla:"\xBFPor qu\xE9? \u{1F440}",tip:"Pregunta sin responder = el espectador no puede irse hasta saber. Es el mecanismo m\xE1s poderoso de retenci\xF3n en video corto."},{label:"VILLAIN",tiempo:"0:16-0:22",color:"#CF343A",icon:"\u{1F3ED}",audio:'"Porque hay un modelo de negocio montado alrededor del papel. Imprentas, distribuci\xF3n, contratos. Moverlo a digital destruye ese negocio. No es ignorancia, es inter\xE9s."',visual:"Quitas GS \xB7 primer plano directo",pantalla:"El negocio del papel",tip:"Nombrar al villano espec\xEDfico (imprentas/contratos) genera m\xE1s comentarios que una cr\xEDtica gen\xE9rica. La audiencia lo va a compartir para validar lo que ya sospechaba."},{label:"REGLA DE ORO",tiempo:"0:22-0:28",color:"#E8C046",icon:"\u{1F947}",audio:'"Los que s\xED ganan elecciones lo entendieron hace tiempo: la exposici\xF3n se gana en digital y se afianza en f\xEDsico. No al rev\xE9s."',visual:"Cambio de \xE1ngulo ligero",pantalla:"Regla de oro \u{1F947}",tip:"Contraste claro entre los que ganan y los que pierden. Posiciona a Jairo como quien sabe cu\xE1l es el lado correcto."},{label:"PRUEBA EXTERNA",tiempo:"0:28-0:33",color:"#4A9EE0",icon:"\u{1F1FA}\u{1F1F8}",audio:'"Obama lo demostr\xF3 en 2008: construy\xF3 una base de 13 millones de contactos digitales antes de mandar a la gente a tocar puertas."',visual:"Foto de Obama en campa\xF1a 2008 o gr\xE1fico de anal\xEDtica digital",pantalla:"Obama 2008 \xB7 13M contactos",tip:"Autoridad externa + n\xFAmero concreto = credibilidad prestada. El caso Obama es universalmente conocido y no genera debate pol\xEDtico propio."},{label:"PRUEBA PROPIA",tiempo:"0:33-0:41",color:"#199477",icon:"\u{1F4CA}",audio:'"Nosotros lo replicamos en Colombia: elecciones al Congreso, estrategia 100% digital, m\xE1s de 130.000 contactos reales. Cero papel tirado a la calle."',visual:"N\xFAmero +130.000 en pantalla grande \xB7 rostro seguro",pantalla:"+130.000 contactos reales \u2705",tip:"El proof point m\xE1s poderoso del video \u2014 n\xFAmero espec\xEDfico, caso real, resultado concreto. Diferencia a Jairo de cualquiera que solo teoriza."},{label:"CTA POLARIZANTE",tiempo:"0:41-0:47",color:"#7C3AED",icon:"\u{1F4AC}",audio:'"\xBFMiedo a innovar o negocio que no quieren soltar? Dime en los comentarios \u2014 y si conoces a alguien en pol\xEDtica, m\xE1ndale esto."',visual:"Primer plano \xB7 se\xF1alas c\xE1mara",pantalla:"\xBFMiedo o negocio? \u{1F4AC}\u{1F447}",tip:"Pregunta polarizante que obliga a elegir un lado + pedido expl\xEDcito de share. Cada comentario alimenta el algoritmo, cada share ampl\xEDa el alcance."}],copy:`El mayor fraude del marketing pol\xEDtico no es la corrupci\xF3n.
Es el volante que todos saben que va a la basura y mandan igual. \u{1F4B8}

No es ignorancia. Es un modelo de negocio:
imprentas, distribuci\xF3n, contratos.
Moverlo a digital destruye ese ecosistema.
Y eso nadie lo quiere admitir.

Los que s\xED ganan elecciones lo entendieron hace rato:
\u{1F4F1} La exposici\xF3n se construye en digital.
\u{1F3D8}\uFE0F Se convierte en f\xEDsico.

Obama lo demostr\xF3 en 2008 con 13 millones de contactos
antes de movilizar gente puerta a puerta.

Nosotros lo replicamos en Colombia:
elecciones al Congreso \xB7 estrategia 100% digital
\u2192 +130.000 contactos reales, sin botar papel a las calles.

\xBFMiedo a innovar o un modelo que no quieren soltar?
Te leo \u{1F447}

\u{1F4CC} Guarda esto si analizas marketing o pol\xEDtica.

onde ya dijo si su P-Max tiene las se\xF1ales necesarias o no."}],copy:`El error m\xE1s caro en Google Ads no es el presupuesto.
