  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',system-ui,sans-serif;background:#04050A;color:#FDFCF7;}
    input[type=date]{color-scheme:dark;background:#1A1B24;color:#FDFCF7;border:1px solid #1E1F28;padding:3px 8px;border-radius:6px;font-size:10px;font-family:monospace;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:#0C0D13;}
    ::-webkit-scrollbar-thumb{background:#1E1F28;border-radius:2px;}
    select option{background:#1A1B24;color:#FDFCF7;}
    button,select,a{cursor:pointer;}
    
  .report-footer{background:#0C0D13;border-top:1px solid #1E1F28;padding:24px 20px;margin-top:32px}
  .footer-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
  .footer-brand{display:flex;align-items:center;gap:10px}
  .footer-logo{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid #E8C046;background:transparent;flex-shrink:0}
  .footer-logo img{width:100%;height:100%;object-fit:contain}
  .footer-name{font-family:monospace;font-size:11px;color:#E8C046;font-weight:600}
  .footer-sub{font-size:9px;color:#A8A598}
  .footer-date{font-family:monospace;font-size:9px;color:#A8A598;margin-top:2px}
  .footer-links{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .footer-social{width:30px;height:30px;border-radius:50%;background:#14151C;border:1px solid #1E1F28;display:flex;align-items:center;justify-content:center;transition:.2s;cursor:pointer;text-decoration:none}

te que sus volantes van a la basura."',visual:"Primer plano \xB7 sin distracciones \xB7 corte limpio",pantalla:"\u2014",tip:"Declaraci\xF3n que nombra un culpable \u2014 dispara comentarios de quienes est\xE1n de acuerdo y de quienes defienden el sistema."},{label:"OPEN LOOP",tiempo:"0:12-0:16",color:"#E8C046",icon:"\u{1F440}",audio:'"Y los mandan igual. \xBFPor qu\xE9?"',visual:"Zoom out sutil \xB7 Green Screen con imagen de volantes en el suelo",pantalla:"\xBFPor qu\xE9? \u{1F440}",tip:"Pregunta sin responder = el espectador no puede irse hasta saber. Es el mecanismo m\xE1s poderoso de retenci\xF3n en video corto."},{label:"VILLAIN",tiempo:"0:16-0:22",color:"#CF343A",icon:"\u{1F3ED}",audio:'"Porque hay un modelo de negocio montado alrededor del papel. Imprentas, distribuci\xF3n, contratos. Moverlo a digital destruye ese negocio. No es ignorancia, es inter\xE9s."',visual:"Quitas GS \xB7 primer plano directo",pantalla:"El negocio del papel",tip:"Nombrar al villano espec\xEDfico (imprentas/contratos) genera m\xE1s comentarios que una cr\xEDtica gen\xE9rica. La audiencia lo va a compartir para validar lo que ya sospechaba."},{label:"REGLA DE ORO",tiempo:"0:22-0:28",color:"#E8C046",icon:"\u{1F947}",audio:'"Los que s\xED ganan elecciones lo entendieron hace tiempo: la exposici\xF3n se gana en digital y se afianza en f\xEDsico. No al rev\xE9s."',visual:"Cambio de \xE1ngulo ligero",pantalla:"Regla de oro \u{1F947}",tip:"Contraste claro entre los que ganan y los que pierden. Posiciona a Jairo como quien sabe cu\xE1l es el lado correcto."},{label:"PRUEBA EXTERNA",tiempo:"0:28-0:33",color:"#4A9EE0",icon:"\u{1F1FA}\u{1F1F8}",audio:'"Obama lo demostr\xF3 en 2008: construy\xF3 una base de 13 millones de contactos digitales antes de mandar a la gente a tocar puertas."',visual:"Foto de Obama en campa\xF1a 2008 o gr\xE1fico de anal\xEDtica digital",pantalla:"Obama 2008 \xB7 13M contactos",tip:"Autoridad externa + n\xFAmero concreto = credibilidad prestada. El caso Obama es universalmente conocido y no genera debate pol\xEDtico propio."},{label:"PRUEBA PROPIA",tiempo:"0:33-0:41",color:"#199477",icon:"\u{1F4CA}",audio:'"Nosotros lo replicamos en Colombia: elecciones al Congreso, estrategia 100% digital, m\xE1s de 130.000 contactos reales. Cero papel tirado a la calle."',visual:"N\xFAmero +130.000 en pantalla grande \xB7 rostro seguro",pantalla:"+130.000 contactos reales \u2705",tip:"El proof point m\xE1s poderoso del video \u2014 n\xFAmero espec\xEDfico, caso real, resultado concreto. Diferencia a Jairo de cualquiera que solo teoriza."},{label:"CTA POLARIZANTE",tiempo:"0:41-0:47",color:"#7C3AED",icon:"\u{1F4AC}",audio:'"\xBFMiedo a innovar o negocio que no quieren soltar? Dime en los comentarios \u2014 y si conoces a alguien en pol\xEDtica, m\xE1ndale esto."',visual:"Primer plano \xB7 se\xF1alas c\xE1mara",pantalla:"\xBFMiedo o negocio? \u{1F4AC}\u{1F447}",tip:"Pregunta polarizante que obliga a elegir un lado + pedido expl\xEDcito de share. Cada comentario alimenta el algoritmo, cada share ampl\xEDa el alcance."}],copy:`El mayor fraude del marketing pol\xEDtico no es la corrupci\xF3n.
Es el volante que todos saben que va a la basura y mandan igual. \u{1F4B8}

No es ignorancia. Es un modelo de negocio:
imprentas, distribuci\xF3n, contratos.
Moverlo a digital destruye ese ecosistema.
Y eso nadie lo quiere admitir.

Los que s\xED ganan elecciones lo entendieron hace rato:
\u{1F4F1} La exposici\xF3n se construye en digital.
\u{1F3D8}\uFE0F Se convierte en f\xEDsico.

Obama lo demostr\xF3 en 2008 con 13 millones de contactos
antes de movilizar gente puerta a puerta.

Nosotros lo replicamos en Colombia:
elecciones al Congreso \xB7 estrategia 100% digital
\u2192 +130.000 contactos reales, sin botar papel a las calles.

\xBFMiedo a innovar o un modelo que no quieren soltar?

r las pujas, pausar los anuncios que no convierten y escalar los que s\xED \u2014 sin que nadie lo toque. Esto no es el futuro. Pas\xF3 hace 6 semanas."',visual:"Primer plano \xB7 pausa dram\xE1tica antes de hablar la \xFAltima frase",pantalla:"IA gestionando campa\xF1as sola \xB7 ya ocurri\xF3",tip:"El tiempo verbal pasado (pas\xF3 hace 6 semanas) hace la afirmaci\xF3n m\xE1s impactante que el futuro. Ya es realidad, no predicci\xF3n."},{label:"EL VILLANO",tiempo:"0:26-0:35",color:"#CF343A",icon:"\u{1F3ED}",audio:'"Las agencias que cobran por gesti\xF3n manual de cuentas tienen un problema serio. Porque dentro de 12 meses, lo que ellas hacen en una semana, una IA lo va a hacer en 10 minutos."',visual:"Gestos con las manos \xB7 tono de an\xE1lisis \xB7 no de ataque",pantalla:"El modelo de negocio de las agencias \u{1F3ED}",tip:"Nombrar el villain (agencias que cobran por gesti\xF3n manual) genera comentarios de defensa y de acuerdo. La comparaci\xF3n semana vs 10 minutos es la imagen m\xE1s memorable del video."},{label:"EL BRIDGE",tiempo:"0:35-0:41",color:"#199477",icon:"\u{1F9ED}",audio:'"Pero aqu\xED est\xE1 la clave: la IA todav\xEDa necesita que alguien sepa dirigirla. El media buyer que entiende c\xF3mo funciona la IA por dentro es el que va a sobrevivir y crecer."',visual:"Primer plano \xB7 tono seguro \xB7 reencuadra el mensaje",pantalla:"Quien dirige la IA, gana",tip:"El reencuadre positivo despu\xE9s del villain es necesario \u2014 sin \xE9l el video genera solo miedo. La frase quien entiende la IA por dentro es el gancho para el curso de TikTok Ads."},{label:"CTA",tiempo:"0:41-0:45",color:"#7C3AED",icon:"\u{1F4AC}",audio:'"\xBFEl media buyer humano tiene futuro o ya lo estamos viendo morir? Dime en los comentarios."',visual:"Se\xF1alas c\xE1mara \xB7 directo",pantalla:"\xBFFuturo o extinci\xF3n? \u{1F447}",tip:"Pregunta existencial que nadie puede ignorar. Todo media buyer en la audiencia de Jairo tiene una opini\xF3n sobre esto \u2014 y va a expresarla en comentarios."}],copy:`TikTok acaba de hacer la intervenci\xF3n humana en publicidad\u2026 opcional. \u{1F440}

\u2192 Infraestructura abierta para agentes de IA

#TikTokAds #MediaBuyer #IA #InteligenciaArtificial #MarketingDigital #FuturoDelMarketing`,produccion:["GS: pantalla de TikTok World o anuncio oficial del MCP Server","La pregunta del CTA es intencionalmente provocadora \u2014 no suavizarla \u2014 genera debate masivo","Miniatura: t\xFA con cara de alerta \xB7 texto TikTok acaba de hacer a los media buyers opcionales","M\xFAsica: tecnol\xF3gica \xB7 algo que suene a futuro","M\xE1ximo 45s \xB7 publicar primero en IG, luego en TikTok org\xE1nico"]},{id:"pmax-error",prioridad:8,titulo:"El 90% de los P-Max Est\xE1n Mal Configurados",formato:"Reel",plataformas:["Instagram","TikTok"],estado:"En revisi\xF3n",duracion:"44s",fecha_grabacion:"2026-07-17",fecha_publicacion:"2026-07-21",objetivo:"Opini\xF3n fuerte \xB7 posicionar a Jairo como el que audita lo que otros lanzan mal",blocks:[{label:"PRE-HOOK",tiempo:"0:00-0:04",color:"#CF343A",icon:"\u{1F4B8}",audio:'"El error m\xE1s caro que veo en Google Ads no es el presupuesto. Es lanzar P-Max sin estar listos."',visual:"T\xFA a c\xE1mara \xB7 tono seguro \xB7 de quien ha visto esto cientos de veces",pantalla:"El error m\xE1s caro \u{1F4B8}",tip:"Abre con el error antes de explicarlo \u2014 genera curiosidad. La frase no es el presupuesto invierte la expectativa de la audiencia que esperaba otro tipo de error."},{label:"EL DATO",tiempo:"0:04-0:12",color:"#E8C046",icon:"\u{1F4CA}",audio:'"En las auditor\xEDas que hago, el 90% de los P-Max que reviso est\xE1n mal configurados. No porque la campa\xF1a sea mala \u2014 sino porque la lanzaron demasiado pronto."',visual:"GS: pantalla de P-Max en Google Ads \xB7 se\xF1alas la campa\xF1a",pantalla:"90% mal configurados \u{1F4CA}",tip:"El porcentaje concreto (90%) hace la afirmaci\xF3n medible y provocadora. La raz\xF3n (demasiado pronto, no la campa\xF1a) desmonta la defensa antes de que aparezca."},{label:"POR QU\xC9 FALLA",tiempo:"0:12-0:24",color:"#4A9EE0",icon:"\u{1F522}",audio:'"P-Max necesita m\xEDnimo 50 conversiones al mes para que el algoritmo optimice bien. Sin esas se\xF1ales, la IA no sabe a qui\xE9n mostrarle el anuncio y el presupuesto se va en impresiones que no convierten. La mayor\xEDa lo lanza el d\xEDa 1, con cuenta nueva, sin historial."',visual:"Primer plano \xB7 explica con los dedos contando \xB7 1-2-3",pantalla:"50 conv/mes m\xEDnimo \xB7 sin historial = dinero perdido",tip:"El n\xFAmero espec\xEDfico (50 conversiones/mes) hace el error tangible y verificable. La imagen del presupuesto y\xE9ndose en impresiones que no convierten es la m\xE1s impactante para el espectador con dinero invertido."},{label:"EL VILLANO",tiempo:"0:24-0:33",color:"#CF343A",icon:"\u{1F3ED}",audio:'"Y el problema es que las agencias lo presentan como la soluci\xF3n m\xE1gica. Lanzamos P-Max y el algoritmo hace todo el trabajo. S\xED \u2014 pero el algoritmo necesita datos para trabajar. Sin datos, trabaja para nada."',visual:"Primer plano \xB7 directo \xB7 sin gestos exagerados",pantalla:"P-Max no es magia \u{1FA84}",tip:"Nombrar la promesa falsa de las agencias (soluci\xF3n m\xE1gica) genera debate. Quienes la han escuchado se identifican, quienes la han dicho se defienden."},{label:"LA SOLUCI\xD3N",tiempo:"0:33-0:40",color:"#199477",icon:"\u2705",audio:'"La secuencia correcta: Search primero, 30 conversiones, luego tCPA, 50 conversiones \u2014 ah\xED lanzas P-Max. Con se\xF1ales reales."',visual:"GS: diagrama visual de la secuencia correcta en 4 pasos",pantalla:"Search \u2192 30 conv \u2192 tCPA \u2192 50 conv \u2192 P-Max \u2705",tip:"La soluci\xF3n visual en 4 pasos es lo que m\xE1s se guarda del video. El diagrama debe verse simple y claro \u2014 es la hoja de ruta que la gente busca."},{label:"CTA",tiempo:"0:40-0:44",color:"#CF343A",icon:"\u{1F4AC}",audio:'"\xBFTienes P-Max activo? Dime cu\xE1ntas conversiones al mes tiene tu cuenta."',visual:"Se\xF1alas c\xE1mara",pantalla:"\xBFCu\xE1ntas conversiones? \u{1F447}",tip:"Pregunta que revela el estado real de la cuenta del espectador. Quien responde ya dijo si su P-Max tiene las se\xF1ales necesarias o no."}],copy:`El error m\xE1s caro en Google Ads no es el presupuesto.
Es lanzar P-Max sin estar listos. \u{1F4B8}

En las auditor\xEDas que hago, el 90% de los P-Max que reviso est\xE1n mal configurados.

No porque la campa\xF1a sea mala.
Porque la lanzaron demasiado pronto.

P-Max necesita m\xEDnimo 50 conversiones/mes para optimizar bien.
Sin esas se\xF1ales, la IA no sabe a qui\xE9n mostrarle el anuncio.
Y el presupuesto se va en impresiones que no convierten.

El problema: las agencias lo venden como magia.
"Lanzamos P-Max y el algoritmo hace todo."

S\xED \u2014 pero el algoritmo necesita datos para trabajar.
Sin datos, trabaja para nada.

La secuencia correcta:
1\uFE0F\u20E3 Search manual CPC primero
2\uFE0F\u20E3 Acumula 30 conversiones \u2192 activa tCPA
3\uFE0F\u20E3 Llega a 50 conv/mes \u2192 lanza P-Max con se\xF1ales reales

\xBFTienes P-Max activo?
Dime cu\xE1ntas conversiones al mes tiene tu cuenta \u{1F447}

a gu\xEDa de marca. Convierte textos en assets visuales para P-Max y Demand Gen. Ya disponible en cuentas.",visual:"Logo Gemini + Google Ads \xB7 bullets de las capacidades",pantalla:"Asset Studio (Gemini) \xB7 creatividades en segundos",tip:"Mencionar que ya est\xE1 disponible en cuentas elimina la objeci\xF3n de timing. Conecta directamente con P-Max y Demand Gen \u2014 relevante para quien vio el video anterior."},{label:"SLIDE 4 \u2014 AGENTE GOOGLE",tiempo:"Slide 4",color:"#E8C046",icon:"\u{1F916}",audio:"Agente Unificado Google: el nuevo agente abarca Ads, Analytics y Merchant Center. Responde preguntas sobre el rendimiento en lenguaje natural. \xBFQu\xE9 campa\xF1a tiene mejor ROAS este mes? Y te lo dice en segundos.",visual:"Diagrama: Ads + Analytics + MC conectados al agente",pantalla:"Agente Unificado \xB7 Ads + Analytics + MC",tip:"El diagrama visual hace el ecosistema comprensible en un segundo. El ejemplo de pregunta en lenguaje natural (\xBFQu\xE9 campa\xF1a tiene mejor ROAS?) hace el beneficio concreto."},{label:"SLIDE 5 \u2014 SIMPHONY",tiempo:"Slide 5",color:"#7C3AED",icon:"\u{1F3B5}",audio:"Simphony de TikTok: asistente de IA que corrige y optimiza videos activos directamente en Ads Manager. Analiza el hook rate, el completion rate y sugiere cambios espec\xEDficos. Directo en la plataforma.",visual:"Logo TikTok + Simphony \xB7 bullets con m\xE9tricas que analiza",pantalla:"Simphony \xB7 optimiza videos activos",tip:"La herramienta m\xE1s desconocida del stack = el mayor valor del carrusel. La mayor\xEDa no sabe que existe \u2014 genera guardar masivo entre los que manejan TikTok Ads."},{label:"SLIDE 6 \u2014 PERPLEXITY",tiempo:"Slide 6",color:"#CF343A",icon:"\u{1F50D}",audio:"Perplexity para auditar competidores, entender el mercado y buscar benchmarks de la industria en tiempo real. M\xE1s r\xE1pido que Google para preguntas de investigaci\xF3n de marketing. Gratuito.",visual:"Logo Perplexity \xB7 bullets de casos de uso",pantalla:"Perplexity \xB7 investigaci\xF3n en tiempo real \xB7 gratis",tip:"Mencionar que es gratuito elimina la barrera de entrada. La comparaci\xF3n m\xE1s r\xE1pido que Google para preguntas de marketing es la frase m\xE1s citada."},{label:"SLIDE 7 \u2014 LA REGLA",tiempo:"Slide 7",color:"#E8C046",icon:"\u{1F4A1}",audio:"La IA no te reemplaza. Te multiplica. El media buyer que usa estas herramientas hace el trabajo de 3 personas. El que no las usa, compite con alguien que las tiene. En 2026 no se trata de si usar IA \u2014 se trata de qu\xE9 tan bien sabes usarla.",visual:"Solo texto bold en fondo oscuro \xB7 sin \xEDconos \xB7 m\xE1ximo impacto visual",pantalla:"La IA te multiplica. No te reemplaza.",tip:"Solo texto = m\xE1ximo impacto visual en este slide. La frase La IA no te reemplaza. Te multiplica. es el insight m\xE1s compartido del carrusel \u2014 resuelve el miedo de la audiencia."},{label:"SLIDE 8 \u2014 CTA",tiempo:"Slide 8",color:"#199477",icon:"\u{1F4AC}",audio:"\xBFCu\xE1l de estas herramientas ya est\xE1s usando? Dime en los comentarios cu\xE1l ya tienes en tu stack y cu\xE1l te falta.",visual:"CTA claro \xB7 fondo de marca \xB7 instrucci\xF3n de guardar visible",pantalla:"Guarda \u{1F4CC} y dime cu\xE1l usas \u{1F447}",tip:"CTA doble: guardar + comentar = m\xE1ximo engagement. La pregunta cu\xE1l te falta genera respuestas que muestran el gap de la audiencia \u2014 informaci\xF3n \xFAtil para futuros contenidos."}],copy:`Antes me tomaba 3 horas optimizar una cuenta de Google Ads.
